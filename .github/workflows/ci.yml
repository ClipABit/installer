name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================================================================
  # Run Python tests
  # ============================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-suffix: "installer-tests"

      - name: Set up Python
        run: uv python install 3.13

      - name: Run tests (no network, no build artifacts)
        run: |
          uv run --with pytest --with pytest-cov pytest tests/ -m "not network and not build_artifact" --tb=short -v

      - name: Run tests with coverage
        run: |
          uv run --with pytest --with pytest-cov pytest tests/ -m "not network and not build_artifact" --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        continue-on-error: true

  # ============================================================================
  # Python linting and code quality
  # ============================================================================
  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.13

      - name: Install ruff (replaces flake8, black, isort)
        run: uv tool install ruff

      - name: Run ruff linter
        run: |
          # Check for errors (syntax errors, undefined names, etc.)
          uv tool run ruff check . --select=E9,F63,F7,F82
          # Full lint with warnings
          uv tool run ruff check . --exit-zero
        continue-on-error: true

      - name: Check code formatting with ruff
        run: |
          uv tool run ruff format --check .
        continue-on-error: true

  # ============================================================================
  # Build installers (calls reusable workflow)
  # ============================================================================
  build:
    name: Build Installers
    needs: [test]
    uses: ./.github/workflows/build_installers.yml
    secrets: inherit

  # ============================================================================
  # Security scan
  # ============================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # ============================================================================
  # Validate shell scripts
  # ============================================================================
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ShellCheck on build scripts
        run: |
          sudo apt-get install -y shellcheck
          shellcheck build-pkg.sh post-install-scripts/postinstall || true
        continue-on-error: true

  # ============================================================================
  # Summary job (reports overall status)
  # ============================================================================
  ci-success:
    name: CI Success
    needs: [test, lint, build]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check all jobs succeeded
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Tests failed"
            exit 1
          fi
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          echo "✅ All CI checks passed!"
